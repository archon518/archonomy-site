<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHONOMY</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold-light: #f5e9d6;
            --gold-mid: #d4b98a;
            --gold-dark: #b89c6b;
        }

        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d; /* deep charcoal */
            color: var(--gold-light);
            font-family: 'Cormorant SC', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 900px;
            padding: 40px;
        }

        h1 {
            font-family: 'Cormorant SC', serif;
            font-weight: 500;
            font-size: 72px;
            letter-spacing: -0.5px;
            line-height: 0.9;
            color: rgba(245, 233, 214, 0.92);
            text-shadow: 0px 1px 2px rgba(0,0,0,0.25);
            mix-blend-mode: overlay;
            margin-bottom: 10px;
        }

        .header-line {
            width: 140px;
            height: 1px;
            background: linear-gradient(to right, var(--gold-dark), var(--gold-light), var(--gold-dark));
            margin: 0 auto 30px;
            opacity: 0.75;
        }

        p {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 0.3px;
            line-height: 1.25;
            color: rgba(245, 233, 214, 0.85);
            max-width: 700px;
            margin: 0 auto;
            mix-blend-mode: overlay;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>ARCHONOMY</h1>
        <div class="header-line"></div>

        <p>
            A discipline of structure, identity, and defined order — expressed through clarity
