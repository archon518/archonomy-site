<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARCHONOMY — The Meta-Discipline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #06060a;
      --surface:  #09090f;
      --border:   #141420;
      --border2:  #1e1e30;
      --gold:     #c9a84c;
      --gold-dim: rgba(201,168,76,.1);
      --gold-glow:rgba(201,168,76,.06);
      --muted:    #4a4a60;
      --text:     #b8b8cc;
      --heading:  #e8e8f4;
      --white:    #f4f4ff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 18px;
      line-height: 1.7;
      overflow-x: hidden;
      cursor: none;
    }

    /* ─── CURSOR ─────────────────────────── */
    #cur-dot {
      position: fixed; top: 0; left: 0; z-index: 9999;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); pointer-events: none;
      transform: translate(-50%,-50%);
    }
    #cur-ring {
      position: fixed; top: 0; left: 0; z-index: 9998;
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid rgba(201,168,76,.3);
      pointer-events: none; transform: translate(-50%,-50%);
      transition: width .2s, height .2s, border-color .2s, opacity .2s;
    }

    /* ─── GRAIN OVERLAY ──────────────────── */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='grain'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23grain)' opacity='1'/%3E%3C/svg%3E");
      opacity: .032; pointer-events: none;
    }

    /* ─── NAV ────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 3.5rem;
      background: rgba(6,6,10,.85); backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Cinzel', serif; font-size: 1.1rem;
      font-weight: 600; letter-spacing: .3em;
      color: var(--white); text-decoration: none;
      display: flex; align-items: center; gap: .7rem;
    }
    .nav-logo .arch { color: var(--gold); }
    .nav-seal {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); opacity: .7;
    }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-family: 'DM Mono', monospace; font-size: .65rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color .25s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-cta {
      font-family: 'DM Mono', monospace; font-size: .64rem;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--bg); background: var(--gold);
      padding: .55rem 1.5rem; text-decoration: none;
      transition: opacity .2s, transform .15s;
    }
    .nav-cta:hover { opacity: .88; transform: translateY(-1px); }

    /* ─── HERO ───────────────────────────── */
    .hero {
      position: relative; min-height: 100vh;
      display: grid; place-items: center;
      padding: 8rem 3.5rem 6rem; overflow: hidden;
    }

    /* Radial atmosphere */
    .hero-glow {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 900px; height: 900px; border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,.04) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Concentric ring decorations */
    .hero-rings {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none; z-index: 0;
    }
    .hero-ring {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      border: 1px solid rgba(201,168,76,.06);
      border-radius: 50%;
    }
    .hero-ring:nth-child(1) { width: 320px; height: 320px; }
    .hero-ring:nth-child(2) { width: 520px; height: 520px; border-color: rgba(201,168,76,.04); }
    .hero-ring:nth-child(3) { width: 720px; height: 720px; border-color: rgba(201,168,76,.025); }
    .hero-ring:nth-child(4) { width: 950px; height: 950px; border-color: rgba(201,168,76,.015); }

    .hero-inner {
      position: relative; z-index: 1;
      text-align: center; max-width: 900px;
    }

    .hero-eyebrow {
      font-family: 'DM Mono', monospace; font-size: .65rem;
      letter-spacing: .28em; text-transform: uppercase; color: var(--gold);
      margin-bottom: 2.5rem;
      opacity: 0; animation: fadeUp .7s .2s forwards;
    }

    .hero-title {
      font-family: 'Cinzel', serif; font-weight: 700;
      font-size: clamp(3.5rem, 9vw, 8rem);
      line-height: 1; letter-spacing: .12em;
      color: var(--white);
      opacity: 0; animation: fadeUp .9s .4s forwards;
    }
    .hero-title .arch { color: var(--gold); }

    .hero-rule {
      display: flex; align-items: center; justify-content: center;
      gap: 1.2rem; margin: 2.5rem auto;
      opacity: 0; animation: fadeIn .8s .75s forwards;
    }
    .hero-rule-line { flex: 1; max-width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .hero-rule-diamond {
      width: 8px; height: 8px;
      border: 1px solid var(--gold);
      transform: rotate(45deg);
    }

    .hero-sub {
      font-size: clamp(1rem, 1.6vw, 1.25rem);
      font-style: italic; color: var(--text);
      line-height: 1.8; max-width: 620px; margin: 0 auto;
      opacity: 0; animation: fadeUp .8s .9s forwards;
    }

    .hero-actions {
      display: flex; gap: 1.2rem; align-items: center;
      justify-content: center; margin-top: 3.5rem;
      opacity: 0; animation: fadeUp .75s 1.1s forwards;
    }

    .btn-primary {
      font-family: 'DM Mono', monospace; font-size: .68rem;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--bg); background: var(--gold);
      padding: .9rem 2.4rem; text-decoration: none;
      display: inline-flex; align-items: center; gap: .6rem;
      transition: opacity .2s, transform .15s;
    }
    .btn-primary:hover { opacity: .88; transform: translateY(-2px); }

    .btn-secondary {
      font-family: 'DM Mono', monospace; font-size: .68rem;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--gold); background: transparent;
      border: 1px solid rgba(201,168,76,.35);
      padding: .9rem 2.4rem; text-decoration: none;
      display: inline-flex; align-items: center; gap: .6rem;
      transition: border-color .2s, color .2s, transform .15s;
    }
    .btn-secondary:hover { border-color: var(--gold); transform: translateY(-2px); }

    .hero-five {
      margin-top: 5rem;
      display: flex; justify-content: center; gap: 0;
      opacity: 0; animation: fadeIn 1s 1.4s forwards;
    }
    .h5-item {
      padding: .7rem 1.2rem;
      font-family: 'DM Mono', monospace; font-size: .58rem;
      letter-spacing: .16em; text-transform: uppercase; color: var(--muted);
      border-right: 1px solid var(--border);
      transition: color .25s;
    }
    .h5-item:first-child { border-left: 1px solid var(--border); }
    .h5-item:hover { color: var(--gold); }

    /* ─── SECTION PRIMITIVES ─────────────── */
    section { position: relative; z-index: 1; }
    .bt { border-top: 1px solid var(--border); }
    .c { padding: 7rem 3.5rem; }
    .c-narrow { padding: 7rem 3.5rem; max-width: 1200px; margin: 0 auto; }

    .s-label {
      font-family: 'DM Mono', monospace; font-size: .6rem;
      letter-spacing: .26em; text-transform: uppercase; color: var(--gold);
      margin-bottom: 1rem; display: flex; align-items: center; gap: .8rem;
    }
    .s-label::before { content: ''; display: block; width: 20px; height: 1px; background: var(--gold); }

    .s-heading {
      font-family: 'Cinzel', serif; font-weight: 600;
      font-size: clamp(2rem, 4vw, 3.2rem);
      letter-spacing: .08em; line-height: 1.05;
      color: var(--white);
    }

    .s-subheading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-style: italic;
      color: var(--muted); line-height: 1.7;
      margin-top: 1.2rem;
    }

    /* ─── INTRO BAND ─────────────────────── */
    .intro-band {
      background: var(--surface);
      padding: 4rem 3.5rem;
      display: flex; align-items: center; gap: 5rem;
    }
    .intro-band-left { flex: 1; }
    .intro-band-stat {
      font-family: 'Cinzel', serif; font-size: 3.5rem;
      font-weight: 600; color: var(--gold); line-height: 1;
    }
    .intro-band-label {
      font-family: 'DM Mono', monospace; font-size: .6rem;
      letter-spacing: .2em; text-transform: uppercase; color: var(--muted);
      margin-top: .4rem;
    }
    .intro-band-divider {
      width: 1px; height: 80px; background: var(--border2); flex-shrink: 0;
    }
    .intro-band-text {
      flex: 3; font-size: 1.15rem; color: var(--text); line-height: 1.8;
    }
    .intro-band-text strong { color: var(--heading); font-weight: 600; }

    /* ─── FIVE DISCIPLINES ───────────────── */
    .disciplines { background: var(--surface); }
    .disc-intro {
      display: grid; grid-template-columns: 1fr 1.4fr;
      gap: 6rem; align-items: end; margin-bottom: 5rem;
    }
    .disc-intro p { font-size: 1.05rem; color: var(--muted); line-height: 1.8; margin-top: 1.2rem; }

    .disc-grid {
      display: flex; flex-direction: column; gap: 1px;
    }
    .disc-card {
      display: grid; grid-template-columns: 80px 1fr 1fr;
      gap: 0; border: 1px solid var(--border);
      background: var(--bg);
      transition: background .3s;
      overflow: hidden; position: relative;
    }
    .disc-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: var(--gold);
      transform: scaleY(0); transform-origin: top;
      transition: transform .4s;
    }
    .disc-card:hover { background: #0b0b14; }
    .disc-card:hover::before { transform: scaleY(1); }

    .disc-num-col {
      display: flex; align-items: center; justify-content: center;
      border-right: 1px solid var(--border);
      padding: 2.5rem 0;
    }
    .disc-num {
      font-family: 'Cinzel', serif; font-size: 1.8rem;
      font-weight: 400; color: rgba(201,168,76,.2);
      letter-spacing: .05em; writing-mode: vertical-lr;
      text-orientation: mixed; transform: rotate(180deg);
    }

    .disc-content {
      padding: 2.5rem 2rem 2.5rem 2.5rem;
      border-right: 1px solid var(--border);
    }
    .disc-name {
      font-family: 'Cinzel', serif; font-size: 1.05rem;
      font-weight: 600; color: var(--white); letter-spacing: .08em;
      margin-bottom: .6rem;
    }
    .disc-def {
      font-size: .95rem; color: var(--muted); line-height: 1.75;
      font-style: italic;
    }

    .disc-aspects { padding: 2.5rem 2.5rem; }
    .disc-aspects-label {
      font-family: 'DM Mono', monospace; font-size: .56rem;
      letter-spacing: .2em; text-transform: uppercase; color: var(--gold);
      margin-bottom: 1.2rem;
    }
    .disc-aspect-list { list-style: none; }
    .disc-aspect-list li {
      font-size: .88rem; color: var(--muted); line-height: 1.6;
      padding: .35rem 0; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: .6rem;
    }
    .disc-aspect-list li:last-child { border-bottom: none; }
    .disc-aspect-list li::before { content: '◈'; color: var(--gold); font-size: .55rem; flex-shrink: 0; margin-top: 4px; }

    /* ─── INTEGRATION ────────────────────── */
    .integration-inner {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6rem; align-items: start;
    }
    .integration-diagram {
      position: relative; padding: 3rem;
      border: 1px solid var(--border);
    }
    .int-diag-label {
      font-family: 'DM Mono', monospace; font-size: .56rem;
      letter-spacing: .2em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 2.5rem; padding-bottom: .8rem;
      border-bottom: 1px solid var(--border);
    }
    .int-flow { display: flex; flex-direction: column; gap: 0; }
    .int-step {
      display: flex; align-items: stretch; gap: 0;
    }
    .int-step-left {
      width: 120px; flex-shrink: 0; padding: 1.2rem 1rem;
      border: 1px solid var(--border); text-align: right;
      display: flex; flex-direction: column; justify-content: center;
    }
    .int-step-num {
      font-family: 'Cinzel', serif; font-size: .8rem;
      color: var(--gold); margin-bottom: .2rem;
    }
    .int-step-name {
      font-family: 'DM Mono', monospace; font-size: .58rem;
      letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
    }
    .int-step-connector {
      width: 30px; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center;
    }
    .int-step-line { flex: 1; width: 1px; background: var(--border2); }
    .int-step-arrow { color: var(--gold); font-size: .7rem; padding: .3rem 0; }
    .int-step-body {
      flex: 1; padding: 1.2rem 1.4rem;
      border: 1px solid var(--border);
      font-size: .88rem; color: var(--muted); line-height: 1.65;
    }
    .int-step-body strong { color: var(--text); }

    .integration-right p {
      font-size: 1rem; color: var(--muted); line-height: 1.8; margin-top: 1.2rem;
    }
    .int-loop {
      margin-top: 2.5rem; padding: 1.8rem 2rem;
      border: 1px solid var(--border); background: var(--surface);
    }
    .int-loop-label {
      font-family: 'DM Mono', monospace; font-size: .58rem;
      letter-spacing: .18em; text-transform: uppercase; color: var(--gold);
      margin-bottom: 1.2rem;
    }
    .int-loop-text {
      font-size: .92rem; color: var(--muted); line-height: 1.75;
    }

    /* ─── OFFERINGS ──────────────────────── */
    .offerings { background: var(--surface); }
    .offer-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; border: 1px solid var(--border); margin-top: 4rem;
    }
    .offer-card {
      padding: 2.8rem 2.2rem; border-right: 1px solid var(--border);
      position: relative; transition: background .25s; background: var(--bg);
    }
    .offer-card:last-child { border-right: none; }
    .offer-card:hover { background: #0b0b14; }
    .offer-icon {
      width: 40px; height: 40px; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.8rem; transition: border-color .25s;
    }
    .offer-card:hover .offer-icon { border-color: var(--gold); }
    .offer-num {
      font-family: 'DM Mono', monospace; font-size: .56rem;
      letter-spacing: .2em; color: var(--muted); margin-bottom: 1rem;
    }
    .offer-title {
      font-family: 'Cinzel', serif; font-size: 1rem;
      font-weight: 600; color: var(--white); letter-spacing: .06em;
      margin-bottom: .8rem; line-height: 1.3;
    }
    .offer-desc { font-size: .9rem; color: var(--muted); line-height: 1.7; }
    .offer-list { list-style: none; margin-top: 1.4rem; }
    .offer-list li {
      font-family: 'DM Mono', monospace; font-size: .62rem;
      letter-spacing: .06em; color: var(--muted); padding: .38rem 0;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: .5rem;
    }
    .offer-list li::before { content: '→'; color: var(--gold); flex-shrink: 0; }
    .offer-list li:last-child { border-bottom: none; }

    /* ─── CERTIFICATION ──────────────────── */
    .cert-band {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    }
    .cert-left {
      padding: 7rem 3.5rem; border-right: 1px solid var(--border);
    }
    .cert-right {
      padding: 7rem 3.5rem; background: var(--surface);
    }
    .cert-levels {
      display: flex; flex-direction: column; gap: 1px; margin-top: 3.5rem;
    }
    .cert-level {
      display: flex; align-items: stretch; border: 1px solid var(--border);
      background: var(--bg); transition: background .25s; margin-bottom: 1px;
    }
    .cert-level:hover { background: #0b0b14; }
    .cert-level-marker {
      width: 4px; flex-shrink: 0;
      background: rgba(201,168,76,.15);
      transition: background .25s;
    }
    .cert-level:hover .cert-level-marker { background: var(--gold); }
    .cert-level-content { padding: 1.4rem 1.6rem; flex: 1; }
    .cert-level-name {
      font-family: 'Cinzel', serif; font-size: .9rem;
      font-weight: 600; color: var(--white); letter-spacing: .1em;
      margin-bottom: .3rem;
    }
    .cert-level-desc { font-size: .88rem; color: var(--muted); line-height: 1.6; }
    .cert-level-tag {
      flex-shrink: 0; display: flex; align-items: center;
      padding: 0 1.4rem;
      font-family: 'DM Mono', monospace; font-size: .56rem;
      letter-spacing: .14em; text-transform: uppercase; color: var(--gold);
      border-left: 1px solid var(--border);
    }

    .cert-right-content { margin-top: 3.5rem; }
    .cert-right-content p {
      font-size: 1rem; color: var(--muted); line-height: 1.8; margin-bottom: 1.2rem;
    }
    .cert-modules { margin-top: 2.5rem; }
    .cert-module {
      padding: 1.2rem 1.4rem; border: 1px solid var(--border);
      background: var(--bg); margin-bottom: 1px;
      display: flex; align-items: center; gap: 1rem;
      transition: background .25s;
    }
    .cert-module:hover { background: #0b0b14; }
    .cert-module-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0;
    }
    .cert-module-text {
      font-family: 'DM Mono', monospace; font-size: .62rem;
      letter-spacing: .1em; color: var(--muted);
    }

    /* ─── AUDIENCE ───────────────────────── */
    .audience-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; border: 1px solid var(--border); margin-top: 4rem;
    }
    .aud-card {
      padding: 2.2rem 1.8rem; border-right: 1px solid var(--border);
      transition: background .25s;
    }
    .aud-card:last-child { border-right: none; }
    .aud-card:hover { background: var(--surface); }
    .aud-icon {
      font-family: 'Cinzel', serif; font-size: 2rem;
      color: rgba(201,168,76,.2); line-height: 1; margin-bottom: 1.2rem;
    }
    .aud-title {
      font-family: 'Cinzel', serif; font-size: .88rem;
      font-weight: 600; color: var(--white); letter-spacing: .08em;
      margin-bottom: .6rem; line-height: 1.3;
    }
    .aud-desc { font-size: .88rem; color: var(--muted); line-height: 1.65; }

    /* ─── ACTION PLAN ────────────────────── */
    .action-bg { background: var(--surface); }
    .action-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0; border: 1px solid var(--border); margin-top: 4rem;
    }
    .action-item {
      padding: 2.2rem 2.4rem; border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transition: background .25s; background: var(--bg);
    }
    .action-item:nth-child(2n) { border-right: none; }
    .action-item:nth-last-child(-n+2) { border-bottom: none; }
    .action-item:hover { background: #0b0b14; }
    .action-step {
      font-family: 'DM Mono', monospace; font-size: .58rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: .8rem;
    }
    .action-title {
      font-
