    .nav-links {

    }

      position: relative;
      overflow: hidden;
    }

    .hero::after {

      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(15,23,42,0.4), transparent 60%);
      mix-blend-mode: soft-light;
      pointer-events: none;
    }

    .hero-inner {

      z-index: 1;
    }

      letter-spacing: 0.16em;
      color: var(--muted);

    }

      line-height: 1.15;
      margin-bottom: 0.9rem;
      letter-spacing: 0.02em;

    .hero-title span {
      color: var(--accent);

    .hero-subtitle {

      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .hero-subtitle strong {
      color: #e5e7eb;
      font-weight: 500;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
